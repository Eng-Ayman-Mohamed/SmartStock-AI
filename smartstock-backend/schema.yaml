openapi: 3.0.3
info:
  title: SmartStock AI API
  version: 1.0.0
  description: Inventory forecasting and management API
paths:
  /api/ai/documents/:
    get:
      operationId: ai_documents_list
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - ai
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocumentList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
    post:
      operationId: ai_documents_create
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
            examples:
              UploadPDFDocument:
                value:
                  file: (binary PDF file)
                  doc_type: invoice
                summary: Upload PDF Document
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Viewer or above only
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid file or metadata
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Upload or ingestion failed
  /api/ai/documents/{id}/:
    get:
      operationId: ai_documents_retrieve
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this document.
        required: true
      tags:
      - ai
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Document not found
    put:
      operationId: ai_documents_update
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this document.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Bad request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Document not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid file or metadata
    patch:
      operationId: ai_documents_partial_update
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this document.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDocumentUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDocumentUploadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDocumentUploadRequest'
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Bad request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Document not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid file or metadata
    delete:
      operationId: ai_documents_destroy
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this document.
        required: true
      tags:
      - ai
      security:
      - BearerJWT: []
      responses:
        '204':
          description: No response body
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Admin only
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Document not found
  /api/ai/nlquery/:
    post:
      operationId: ai_nlquery_create
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NLQueryRequest'
            examples:
              NLQueryRequest:
                value:
                  query: show me products with low stock
                summary: NL Query Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NLQueryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NLQueryRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      answer:
                        type: string
                        description: Natural language response
                      action:
                        type: object
                      raw_data:
                        type: array
                        items:
                          type: object
              examples:
                NLQueryResponse:
                  value:
                    status: success
                    data:
                      answer: 'There are 3 products with low stock: Widget A (5 units),
                        Gadget B (3 units)'
                      action:
                        type: get_low_stock
                        filters: {}
                      raw_data:
                      - sku_code: SKU001
                        sku__product__name: Widget A
                        quantity_on_hand: 5
                        reorder_point: 10
                  summary: NL Query Response
          description: Natural language query result
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request or prompt injection detected
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Validation error
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: AI pipeline error
        '504':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Gateway timeout — AI pipeline took too long
  /api/audit/logs/:
    get:
      operationId: audit_logs_list
      parameters:
      - in: query
        name: entity_type
        schema:
          type: string
      - in: query
        name: event
        schema:
          type: string
          enum:
          - AGENT_RUN_COMPLETED
          - INVOICE_CONFIRMED
          - INVOICE_REJECTED
          - PO_APPROVED
          - PO_CREATED
          - PO_REJECTED
          - PO_SENT
          - PRODUCT_CREATED
          - PRODUCT_UPDATED
          - PROMPT_INJECTION_ATTEMPT
          - STOCK_ADJUSTED
          - USER_LOGIN
          - VISION_EXTRACTION_FAILED
        description: |-
          * `USER_LOGIN` - User Login
          * `PO_CREATED` - Po Created
          * `PO_APPROVED` - Po Approved
          * `PO_REJECTED` - Po Rejected
          * `PO_SENT` - Po Sent
          * `STOCK_ADJUSTED` - Stock Adjusted
          * `PRODUCT_CREATED` - Product Created
          * `PRODUCT_UPDATED` - Product Updated
          * `INVOICE_CONFIRMED` - Invoice Confirmed
          * `INVOICE_REJECTED` - Invoice Rejected
          * `PROMPT_INJECTION_ATTEMPT` - Prompt Injection Attempt
          * `VISION_EXTRACTION_FAILED` - Vision Extraction Failed
          * `AGENT_RUN_COMPLETED` - Agent Run Completed
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: user
        schema:
          type: integer
      tags:
      - audit
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Admin only
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
            examples:
              LoginRequest:
                value:
                  email: user@example.com
                  password: securePass123
                summary: Login Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: JWT access token
                  user:
                    $ref: '#/components/schemas/Me'
          description: Login successful
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid credentials
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
