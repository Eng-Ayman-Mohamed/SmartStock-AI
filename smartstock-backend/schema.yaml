          description: Transcription failed
  /api/audit/logs/:
    get:
      operationId: audit_logs_list
      parameters:
      - in: query
        name: entity_type
        schema:
          type: string
      - in: query
        name: event
        schema:
          type: string
          enum:
          - AGENT_RUN_COMPLETED
          - AI_CHAT_QUERY
          - AI_NL_QUERY
          - AI_RAG_QUERY
          - EMAIL_DELIVERY_FAILED
          - INVOICE_CONFIRMED
          - INVOICE_REJECTED
          - PO_APPROVED
          - PO_CREATED
          - PO_REJECTED
          - PO_SENT
          - PRODUCT_CREATED
          - PRODUCT_UPDATED
          - PROMPT_INJECTION_ATTEMPT
          - STOCK_ADJUSTED
          - SUPPLIER_TIMEOUT
          - USER_LOGIN
          - VISION_EXTRACTION_FAILED
        description: |-
          * `USER_LOGIN` - User Login
          * `PO_CREATED` - Po Created
          * `PO_APPROVED` - Po Approved
          * `PO_REJECTED` - Po Rejected
          * `PO_SENT` - Po Sent
          * `STOCK_ADJUSTED` - Stock Adjusted
          * `PRODUCT_CREATED` - Product Created
          * `PRODUCT_UPDATED` - Product Updated
          * `INVOICE_CONFIRMED` - Invoice Confirmed
          * `INVOICE_REJECTED` - Invoice Rejected
          * `PROMPT_INJECTION_ATTEMPT` - Prompt Injection Attempt
          * `AI_RAG_QUERY` - Ai Rag Query
          * `AI_NL_QUERY` - Ai Nl Query
          * `AI_CHAT_QUERY` - Ai Chat Query
          * `VISION_EXTRACTION_FAILED` - Vision Extraction Failed
          * `AGENT_RUN_COMPLETED` - Agent Run Completed
          * `EMAIL_DELIVERY_FAILED` - Email Delivery Failed
          * `SUPPLIER_TIMEOUT` - Supplier Timeout
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: user
        schema:
          type: integer
      tags:
      - audit
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Admin only
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
