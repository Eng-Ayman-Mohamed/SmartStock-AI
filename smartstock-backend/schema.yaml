  /api/ai/nlquery/:
    post:
      operationId: ai_nlquery_create
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NLQueryRequest'
            examples:
              NLQueryRequest:
                value:
                  query: show me products with low stock
                summary: NL Query Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NLQueryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NLQueryRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      answer:
                        type: string
                        description: Natural language response
                      action:
                        type: object
                      raw_data:
                        type: array
                        items:
                          type: object
              examples:
                NLQueryResponse:
                  value:
                    status: success
                    data:
                      answer: 'There are 3 products with low stock: Widget A (5 units),
                        Gadget B (3 units)'
                      action:
                        type: get_low_stock
                        filters: {}
                      raw_data:
                      - sku_code: SKU001
                        sku__product__name: Widget A
                        quantity_on_hand: 5
                        reorder_point: 10
                  summary: NL Query Response
          description: Natural language query result
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request or prompt injection detected
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Validation error
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: AI pipeline error
        '504':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Gateway timeout — AI pipeline took too long
  /api/ai/rag-query/:
    post:
      operationId: ai_rag_query_create
      description: |-
        POST /api/ai/rag-query/
        Accepts { "query": "string" } and returns an LLM-generated answer
        grounded in internal documents, with mandatory source citations.
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGQueryRequest'
            examples:
              RAGQueryRequest:
                value:
                  query: What are our top selling products this month?
                summary: RAG Query Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RAGQueryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RAGQueryRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryResponse'
              examples:
                RAGQueryResponse:
                  value:
                    status: success
                    data:
                      answer: Based on the sales data, your top selling products are...
                      sources:
                      - document: sales_report.pdf
                        page: 1
                  summary: RAG Query Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request or prompt injection detected
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: RAG service unavailable
        '504':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Gateway timeout
  /api/ai/transcribe/:
