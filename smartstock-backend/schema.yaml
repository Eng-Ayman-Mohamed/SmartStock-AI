          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Document not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid file or metadata
    patch:
      operationId: ai_documents_partial_update
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this document.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDocumentUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDocumentUploadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDocumentUploadRequest'
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Bad request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Document not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid file or metadata
    delete:
      operationId: ai_documents_destroy
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this document.
        required: true
      tags:
      - ai
      security:
      - BearerJWT: []
      responses:
        '204':
          description: No response body
        '403':
          content:
            application/json:
              schema:
