openapi: 3.0.3
info:
  title: SmartStock AI API
  version: 1.0.0
  description: Inventory forecasting and management API
paths:
  /api/ai/chat/:
    post:
      operationId: ai_chat_create
      description: |-
        POST /api/ai/chat/
        Unified endpoint that routes queries to NL Query or RAG engine
        based on mode parameter or automatic intent classification.
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              ChatRequest(auto):
                value:
                  query: How many Widget-001 do we have?
                summary: Chat Request (auto)
              ChatRequest(explicitMode):
                value:
                  query: What is our return policy?
                  mode: rag
                summary: Chat Request (explicit mode)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              examples:
                ChatResponse:
                  value:
                    status: success
                    data:
                      engine: nl_query
                      mode: auto
                      answer: You have 42 units of Widget-001 in stock.
                      action:
                        type: get_inventory
                        filters: {}
                  summary: Chat Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request or prompt injection detected
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Validation error
        '504':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Gateway timeout
  /api/ai/documents/:
    get:
      operationId: ai_documents_list
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - ai
      security:
      - BearerJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocumentList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Authentication required
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Forbidden
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
    post:
      operationId: ai_documents_create
      description: |-
        CRUD for RAG documents.

        - Viewer+: list, retrieve
        - Manager+: upload (create)
        - Admin: soft-delete
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
            examples:
              UploadPDFDocument:
                value:
                  file: (binary PDF file)
                  doc_type: invoice
                summary: Upload PDF Document
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
        required: true
      security:
      - BearerJWT: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Bad request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Viewer or above only
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid file or metadata
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Upload or ingestion failed
  /api/ai/documents/{id}/:
