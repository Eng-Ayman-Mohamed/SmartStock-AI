components:
  schemas:
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          $ref: '#/components/schemas/EventEnum'
        entity_type:
          type: string
          maxLength: 100
        entity_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        ip_address:
          type: string
          nullable: true
        data_snapshot: {}
        timestamp:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          nullable: true
      required:
      - event
      - id
      - timestamp
    AuthSuccessResponse:
      type: object
      properties:
        access:
          type: string
          description: JWT access token
        refresh:
          type: string
          description: JWT refresh token (also set as HttpOnly cookie)
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    CustomTokenObtainPairRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    DocTypeEnum:
      enum:
      - policy
      - contract
      - procedure
      - specification
      type: string
      description: |-
        * `policy` - Policy
        * `contract` - Contract
        * `procedure` - Procedure
        * `specification` - Specification
    Document:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        filename:
          type: string
          maxLength: 500
        original_filename:
          type: string
          maxLength: 500
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
        file_size:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        cloudinary_url:
          type: string
          format: uri
          maxLength: 1000
        uploaded_by:
          type: integer
          readOnly: true
          nullable: true
        uploaded_by_username:
          type: string
          readOnly: true
          nullable: true
        ingested_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cloudinary_url
      - created_at
      - doc_type
      - file_size
      - filename
      - id
      - ingested_at
      - original_filename
      - updated_at
      - uploaded_by
      - uploaded_by_username
    DocumentUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
      required:
      - doc_type
      - file
    ErrorResponse:
      type: object
      description: Standard error envelope returned by the custom exception handler.
      properties:
        status:
          type: string
          default: error
          description: Always "error"
        error:
          type: string
          description: Exception or error type
        message:
          type: string
          description: Human-readable error message
        code:
          type: integer
          description: HTTP status code
      required:
      - code
      - error
      - message
    EventEnum:
      enum:
      - USER_LOGIN
      - PO_CREATED
      - PO_APPROVED
      - PO_REJECTED
      - PO_SENT
      - STOCK_ADJUSTED
      - PRODUCT_CREATED
      - PRODUCT_UPDATED
      - INVOICE_CONFIRMED
      - INVOICE_REJECTED
      - PROMPT_INJECTION_ATTEMPT
      - VISION_EXTRACTION_FAILED
      - AGENT_RUN_COMPLETED
      type: string
      description: |-
        * `USER_LOGIN` - User Login
        * `PO_CREATED` - Po Created
        * `PO_APPROVED` - Po Approved
        * `PO_REJECTED` - Po Rejected
        * `PO_SENT` - Po Sent
        * `STOCK_ADJUSTED` - Stock Adjusted
        * `PRODUCT_CREATED` - Product Created
        * `PRODUCT_UPDATED` - Product Updated
        * `INVOICE_CONFIRMED` - Invoice Confirmed
        * `INVOICE_REJECTED` - Invoice Rejected
        * `PROMPT_INJECTION_ATTEMPT` - Prompt Injection Attempt
        * `VISION_EXTRACTION_FAILED` - Vision Extraction Failed
        * `AGENT_RUN_COMPLETED` - Agent Run Completed
    ForecastResult:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sku_code:
          type: string
          readOnly: true
        product_name:
          type: string
          readOnly: true
        forecast_date:
          type: string
          format: date
        predicted_quantity:
          type: number
          format: double
        lower_bound:
          type: number
          format: double
          nullable: true
        upper_bound:
          type: number
          format: double
          nullable: true
        mae:
          type: number
          format: double
          nullable: true
        mape:
          type: number
          format: double
          nullable: true
        model_version:
          type: string
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        sku:
          type: integer
      required:
      - created_at
      - forecast_date
      - id
      - predicted_quantity
      - product_name
      - sku
      - sku_code
      - updated_at
    Me:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        name:
          type: string
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
      required:
      - id
      - name
    NLQueryRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
      required:
      - query
    PaginatedAuditLogList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedDocumentList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
