components:
  schemas:
    AgentRun:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        agent_name:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/AgentRunStatusEnum'
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - agent_name
      - created_at
      - id
      - updated_at
    AgentRunRequest:
      type: object
      properties:
        agent_name:
          type: string
          minLength: 1
          maxLength: 100
        status:
          $ref: '#/components/schemas/AgentRunStatusEnum'
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
      required:
      - agent_name
    AgentRunStatusEnum:
      enum:
      - pending
      - running
      - completed
      - failed
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `completed` - Completed
        * `failed` - Failed
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          $ref: '#/components/schemas/EventEnum'
        entity_type:
          type: string
          maxLength: 100
        entity_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        ip_address:
          type: string
          nullable: true
        data_snapshot: {}
        timestamp:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          nullable: true
      required:
      - event
      - id
      - timestamp
    AuthSuccessResponse:
      type: object
      properties:
        access:
          type: string
          description: JWT access token
        refresh:
          type: string
          description: JWT refresh token (also set as HttpOnly cookie)
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    ChatData:
      type: object
      properties:
        engine:
          type: string
        mode:
          type: string
        answer:
          type: string
        action:
          type: object
          additionalProperties: {}
        sources:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - answer
      - engine
      - mode
    ChatRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 2000
        mode:
          allOf:
          - $ref: '#/components/schemas/ModeEnum'
          default: auto
      required:
      - query
    ChatResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: '#/components/schemas/ChatData'
      required:
      - data
      - status
    CustomTokenObtainPairRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    DocTypeEnum:
      enum:
      - policy
      - contract
      - procedure
      - specification
      type: string
      description: |-
        * `policy` - Policy
        * `contract` - Contract
        * `procedure` - Procedure
        * `specification` - Specification
    Document:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        filename:
          type: string
          maxLength: 500
        original_filename:
          type: string
          maxLength: 500
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
        file_size:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        cloudinary_url:
          type: string
          format: uri
          maxLength: 1000
        uploaded_by:
          type: integer
          readOnly: true
          nullable: true
        uploaded_by_username:
          type: string
          readOnly: true
          nullable: true
        ingested_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cloudinary_url
      - created_at
      - doc_type
      - file_size
      - filename
      - id
      - ingested_at
      - original_filename
      - updated_at
      - uploaded_by
      - uploaded_by_username
    DocumentUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
      required:
      - doc_type
      - file
    ErrorResponse:
      type: object
      description: Standard error envelope returned by the custom exception handler.
      properties:
        status:
          type: string
          default: error
          description: Always "error"
        error:
          type: string
          description: Exception or error type
        message:
          type: string
          description: Human-readable error message
        code:
          type: integer
          description: HTTP status code
      required:
      - code
      - error
      - message
    EventEnum:
      enum:
      - USER_LOGIN
      - PO_CREATED
      - PO_APPROVED
      - PO_REJECTED
      - PO_SENT
      - STOCK_ADJUSTED
      - PRODUCT_CREATED
      - PRODUCT_UPDATED
      - INVOICE_CONFIRMED
      - INVOICE_REJECTED
      - PROMPT_INJECTION_ATTEMPT
      - AI_RAG_QUERY
      - AI_NL_QUERY
      - AI_CHAT_QUERY
      - VISION_EXTRACTION_FAILED
      - AGENT_RUN_COMPLETED
      - EMAIL_DELIVERY_FAILED
      - SUPPLIER_TIMEOUT
      type: string
      description: |-
        * `USER_LOGIN` - User Login
        * `PO_CREATED` - Po Created
        * `PO_APPROVED` - Po Approved
        * `PO_REJECTED` - Po Rejected
        * `PO_SENT` - Po Sent
        * `STOCK_ADJUSTED` - Stock Adjusted
        * `PRODUCT_CREATED` - Product Created
        * `PRODUCT_UPDATED` - Product Updated
        * `INVOICE_CONFIRMED` - Invoice Confirmed
        * `INVOICE_REJECTED` - Invoice Rejected
        * `PROMPT_INJECTION_ATTEMPT` - Prompt Injection Attempt
        * `AI_RAG_QUERY` - Ai Rag Query
        * `AI_NL_QUERY` - Ai Nl Query
        * `AI_CHAT_QUERY` - Ai Chat Query
        * `VISION_EXTRACTION_FAILED` - Vision Extraction Failed
        * `AGENT_RUN_COMPLETED` - Agent Run Completed
        * `EMAIL_DELIVERY_FAILED` - Email Delivery Failed
        * `SUPPLIER_TIMEOUT` - Supplier Timeout
    ForecastResult:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sku_code:
          type: string
          readOnly: true
        product_name:
          type: string
          readOnly: true
        forecast_date:
          type: string
          format: date
        predicted_quantity:
          type: number
          format: double
        lower_bound:
          type: number
          format: double
          nullable: true
        upper_bound:
          type: number
          format: double
          nullable: true
        mae:
          type: number
          format: double
          nullable: true
        mape:
          type: number
          format: double
          nullable: true
        model_version:
          type: string
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        sku:
          type: integer
      required:
      - created_at
      - forecast_date
      - id
      - predicted_quantity
      - product_name
      - sku
      - sku_code
      - updated_at
    Me:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        name:
