# =============================================================================
# SmartStock AI — Render Blueprint
# =============================================================================
# This file defines the full production stack on Render.
# Import via: Render Dashboard → New → Blueprint → point at this file.
#
# Services created:
#   - PostgreSQL (managed database with pgvector)
#   - Redis (managed key-value store)
#   - Backend web service (Django + gunicorn)
#   - Celery worker (background tasks)
#   - Celery beat (scheduled tasks)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Django backend web service
  # ---------------------------------------------------------------------------
  - type: web
    name: smartstock-api
    runtime: image
    dockerfilePath: Dockerfile
    dockerContext: ./smartstock-backend
    plan: starter
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      # Django
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      # Database (from managed PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: smartstock-db
          property: connectionString
      # Redis (from managed Redis)
      - key: REDIS_URL
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      # AI keys (set these in Render dashboard or via env var group)
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      # CORS / CSRF
      - key: CORS_ALLOWED_ORIGINS
        value: "https://smartstock-ai.vercel.app,https://smart-stock-dev.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://smartstock-ai.vercel.app,https://smart-stock-dev.vercel.app"
      # Email
      - key: EMAIL_HOST
        value: smtp.sendgrid.net
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: apikey
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@smartstock.ai

  # ---------------------------------------------------------------------------
  # Celery worker — background task processing
  # ---------------------------------------------------------------------------
  - type: worker
    name: smartstock-celery
    runtime: image
    dockerfilePath: Dockerfile
    dockerContext: ./smartstock-backend
    plan: starter
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        fromService:
          name: smartstock-api
          type: web
          property: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: smartstock-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false

  # ---------------------------------------------------------------------------
  # Celery beat — scheduled task runner (separate from worker)
  # ---------------------------------------------------------------------------
  - type: worker
    name: smartstock-celery-beat
    runtime: image
    dockerfilePath: Dockerfile
    dockerContext: ./smartstock-backend
    plan: starter
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        fromService:
          name: smartstock-api
          type: web
          property: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: smartstock-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: smartstock-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false

databases:
  # ---------------------------------------------------------------------------
  # Managed PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  - name: smartstock-db
    plan: starter
    databaseName: smartstock
    ipAllowList: []
    # Note: pgvector must be enabled after provisioning.
    # See DEPLOY.md for the required SQL command.

  # ---------------------------------------------------------------------------
  # Managed Redis
  # ---------------------------------------------------------------------------
  - name: smartstock-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
