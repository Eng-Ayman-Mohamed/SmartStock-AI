networks:
  smartstock_net:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartstock_db
    environment:
      POSTGRES_DB: ${DB_NAME:-smartstock}
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      smartstock_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartstock} -d ${DB_NAME:-smartstock}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartstock_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      smartstock_net:
        aliases:
          - cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./smartstock-backend
      dockerfile: Dockerfile
    container_name: smartstock_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartstock}:${DB_PASSWORD:-smartstock}@db:5432/${DB_NAME:-smartstock}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.development
    ports:
      - "8000:8000"
    volumes:
      - ./smartstock-backend:/app
    networks:
      - smartstock_net

  celery:
    build:
      context: ./smartstock-backend
      dockerfile: Dockerfile
    container_name: smartstock_celery
    command: celery -A config worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartstock}:${DB_PASSWORD:-smartstock}@db:5432/${DB_NAME:-smartstock}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.development
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    volumes:
      - ./smartstock-backend:/app
    networks:
      - smartstock_net

  celery-beat:
    build:
      context: ./smartstock-backend
      dockerfile: Dockerfile
    container_name: smartstock_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartstock}:${DB_PASSWORD:-smartstock}@db:5432/${DB_NAME:-smartstock}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.development
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; [print(p) for p in os.listdir('/proc') if p.isdigit() and 'celery' in open(f'/proc/{p}/cmdline').read()]\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    volumes:
      - ./smartstock-backend:/app
    networks:
      - smartstock_net

  frontend:
    build:
      context: ./smartstock-frontend
      dockerfile: Dockerfile
    container_name: smartstock_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: /api
      VITE_AUTH_BYPASS: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - smartstock_net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: smartstock_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - smartstock_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: smartstock_alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - smartstock_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    container_name: smartstock_grafana
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: smartstock
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    networks:
      - smartstock_net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  prometheus_data:
  grafana_data: