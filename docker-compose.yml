version: "3.9"

networks:
  smartstock_net:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartstock_db
    environment:
      POSTGRES_DB: ${DB_NAME:-smartstock}
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      smartstock_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartstock} -d ${DB_NAME:-smartstock}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartstock_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      smartstock_net:
        aliases:
          - cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./smartstock-backend
      dockerfile: Dockerfile
    container_name: smartstock_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartstock}:${DB_PASSWORD:-smartstock}@db:5432/${DB_NAME:-smartstock}
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./smartstock-backend:/app
    networks:
      - smartstock_net

  celery:
    build:
      context: ./smartstock-backend
      dockerfile: Dockerfile
    container_name: smartstock_celery
    command: celery -A config worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartstock}:${DB_PASSWORD:-smartstock}@db:5432/${DB_NAME:-smartstock}
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/1
    volumes:
      - ./smartstock-backend:/app
    networks:
      - smartstock_net

  celery-beat:
    build:
      context: ./smartstock-backend
      dockerfile: Dockerfile
    container_name: smartstock_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartstock}:${DB_PASSWORD:-smartstock}@db:5432/${DB_NAME:-smartstock}
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/1
    volumes:
      - ./smartstock-backend:/app
    networks:
      - smartstock_net

  frontend:
    build:
      context: ./smartstock-frontend
      dockerfile: frontend.Dockerfile
    container_name: smartstock_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: /api
      VITE_AUTH_BYPASS: "false"
    networks:
      - smartstock_net

volumes:
  pgdata:
  redisdata: