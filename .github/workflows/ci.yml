name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartstock-backend
    timeout-minutes: 5
    env:
      CI: true
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py check

  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: smartstock-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    timeout-minutes: 10
    defaults:
      run:
        working-directory: smartstock-backend
    env:
      CI: true
      DJANGO_SETTINGS_MODULE: config.settings.test
      REDIS_URL: ${{ secrets.REDIS_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ --cov --cov-fail-under=80 -v
      - name: Validate OpenAPI schema
        run: |
          python manage.py spectacular --file schema.yaml --validate
          python -c "
          import yaml
          from openapi_spec_validator import validate
          with open('schema.yaml') as f:
              schema = yaml.safe_load(f)
          validate(schema)
          print('OpenAPI 3.0 schema validation passed')
          "

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartstock-frontend
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: smartstock-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    timeout-minutes: 5
    defaults:
      run:
        working-directory: smartstock-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: smartstock-frontend/package-lock.json
      - run: npm ci
      - run: npm run build