name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartstock-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartstock-backend
    env:
      CI: "true"
      DJANGO_SECRET_KEY: ci-test-secret-key
      OPENAI_API_KEY: sk-test-placeholder
      COHERE_API_KEY: test-placeholder
      LANGFUSE_PUBLIC_KEY: test-placeholder
      LANGFUSE_SECRET_KEY: test-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: smartstock-backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py test
      - run: python manage.py makemigrations --check
