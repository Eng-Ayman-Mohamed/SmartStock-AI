name: Deploy — Staging

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to Render (staging)
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "204" ]; then
            echo "Render deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "Render deploy hook returned HTTP $RESPONSE"
            exit 1
          fi

  deploy-frontend:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to Vercel (staging)
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_STAGING_DEPLOY_HOOK }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "Vercel deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "Vercel deploy hook returned HTTP $RESPONSE"
            exit 1
          fi

  post-deploy:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 90

      - name: Health check
        run: |
          STATUS=$(curl -s "${{ secrets.RENDER_STAGING_URL }}/api/health/")
          echo "$STATUS" | python3 -m json.tool
          echo "$STATUS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('database') == 'connected', f'Database not connected: {data}'
          print('Health check passed')
          "
